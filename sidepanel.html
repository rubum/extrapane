<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Extrapane AI Chat</title>
  <link rel="stylesheet" href="sidepanel.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link id="hljsStyle" rel="stylesheet" href="lib/highlight-light.min.css">
  <script src="lib/highlight.min.js"></script>
  <script src="lib/chart.umd.min.js"></script>
</head>

<body>
  <div class="chat-container">
    <header class="chat-header">
      <div class="header-animation">
        <div class="anim-square"></div>
        <div class="anim-square"></div>
        <div class="anim-square"></div>
        <div class="anim-square"></div>
        <div class="anim-square"></div>
      </div>
      <div class="logo">
        <div class="logo-text">
          <span class="logo-tagline">Intelligent Web Companion</span>
        </div>
      </div>
      <div class="header-actions">
        <button id="clearBtn" class="icon-btn" title="Clear Conversation">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 6h18"></path>
            <path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"></path>
            <path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"></path>
          </svg>
        </button>
        <button id="settingsBtn" class="icon-btn" title="Settings">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"></circle>
            <path
              d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z">
            </path>
          </svg>
        </button>
      </div>
    </header>

    <div class="input-area-wrapper">
      <div class="context-container" id="contextContainer">
        <!-- Selected elements will appear here as chips -->
      </div>
      <div class="input-area">
        <button id="extractBtn" class="action-btn" title="Extract DOM Element">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <polyline points="21 16 16 21 11 16"></polyline>
            <line x1="16" y1="21" x2="16" y2="10"></line>
            <path d="M12 4H4a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h4"></path>
          </svg>
        </button>
        <textarea id="chatInput" placeholder="Ask anything about the page..." rows="1"></textarea>
        <div class="action-btns">
          <button id="sendBtn" class="action-btn primary" title="Send Message">
            <svg class="send-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
              stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="22" y1="2" x2="11" y2="13"></line>
              <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
            </svg>
          </button>
        </div>
      </div>
    </div>

    <!-- Settings Overlay -->
    <div id="settingsOverlay" class="settings-overlay hidden">
      <div class="settings-content">
        <div class="settings-header">
          <h2>Settings</h2>
          <button id="closeSettingsBtn" class="icon-btn">&times;</button>
        </div>

        <div class="form-group">
          <label for="apiKey">Gemini API Key</label>
          <input type="password" id="apiKey" placeholder="AIZA..." />
          <div class="input-help">Get an API key from <a href="https://aistudio.google.com/app/apikey"
              target="_blank">Google AI Studio</a>. Key is securely saved to local browser storage.</div>
        </div>

        <div class="form-group">
          <label for="modelName">Model</label>
          <select id="modelName">
            <option value="gemini-2.5-flash">Gemini 2.5 Flash</option>
            <option value="gemini-2.5-pro">Gemini 2.5 Pro</option>
            <option value="gemini-3-flash-preview">Gemini 3 Flash</option>
            <option value="gemini-3.1-flash-lite-preview">Gemini 3.1 Flash Lite</option>
            <option value="gemini-3.1-pro-preview">Gemini 3.1 Pro</option>
          </select>
        </div>

        <div class="form-group">
          <label for="themeSelect">Appearance</label>
          <select id="themeSelect">
            <option value="light">Light</option>
            <option value="dark">Dark</option>
          </select>
        </div>

        <button id="saveSettingsBtn" class="btn btn-primary">Save Settings</button>
      </div>
    </div>

    <div class="chat-history" id="chatHistory">
      <!-- Messages will load here dynamically -->
    </div>
  </div>

  <script src="lib/marked.min.js"></script>
  <script type="module" src="js/main.js"></script>
</body>

</html>
